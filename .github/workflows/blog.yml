name: Blog auto-writer

on:
  schedule:
    - cron: "0 7 * * *"       # her gün 10:00 TR — günde 3 özgün SEO yazı (yeni domain için güvenli tempo)
  workflow_dispatch:
    inputs:
      count:
        description: "Kaç yazı üretilsin"
        default: "2"

permissions:
  contents: write

concurrency:
  group: blog-writer
  cancel-in-progress: false

jobs:
  write:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps (Google Indexing)
        run: pip install -r _gen/requirements.txt
      - name: Generate post(s)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLOG_COUNT: ${{ github.event.inputs.count || '2' }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python -u _gen/generate.py
      - name: Dedupe + content-match images (Wikimedia/Pexels)
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python -u _gen/retrofit_dedupe.py
      - name: Ping Google Indexing + IndexNow
        env:
          GOOGLE_INDEXING_SA: ${{ secrets.GOOGLE_INDEXING_SA }}
        run: python -u _gen/index_ping.py
      - name: Post new posts to Bluesky
        env:
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
        run: python -u _gen/social_post.py
      - name: Drip evergreen apps guides to Bluesky (traffic + backlink)
        env:
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          DRIP_PER_RUN: "2"
        run: python -u _gen/social_apps_drip.py
      - name: Commit & push
        run: |
          [ -n "$(git status --porcelain)" ] || { echo "değişiklik yok"; exit 0; }
          # marker koruması: üretilen dosyada conflict işareti varsa DURDUR
          if grep -rIl -e '^<<<<<<< ' -e '^>>>>>>> ' --include='*.html' --include='*.xml' --include='*.json' --include='*.css' --include='*.js' . 2>/dev/null | grep -qv '/.git/'; then echo "::error::conflict marker üretilen dosyada — push iptal"; exit 1; fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "content: yeni blog yazısı (AI, tam-SEO) [skip ci]"
          for i in 1 2 3 4 5; do
            if git pull --rebase -X ours origin main; then
              # rebase sonrası ikinci tarama (güvenlik ağı)
              if grep -rIl -e '^<<<<<<< ' -e '^>>>>>>> ' --include='*.html' --include='*.xml' --include='*.json' --include='*.css' --include='*.js' . 2>/dev/null | grep -qv '/.git/'; then echo "::error::rebase sonrası marker — push iptal"; exit 1; fi
              git push && exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((RANDOM%5+3))
          done
          echo "::warning::blog push başarısız"
      - name: Wait for deploy (og kartı canlı olsun)
        run: sleep 90
      - name: Post to Telegram (app-tespitli link)
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -u _gen/telegram_post.py
      - name: Post to Mastodon (app-tespitli link)
        continue-on-error: true
        env:
          MASTODON_INSTANCE: ${{ secrets.MASTODON_INSTANCE }}
          MASTODON_TOKEN: ${{ secrets.MASTODON_TOKEN }}
        run: python -u _gen/mastodon_post.py
      - name: OneBag push (FCM 'onebag' topic, Salı/Cuma)
        continue-on-error: true
        env:
          FIREBASE_SA_ONEBAG: ${{ secrets.FIREBASE_SA_ONEBAG }}
          FORCE_ONEBAG_PUSH: ${{ github.event.inputs.force_push || 'false' }}
        run: python -u _gen/push_notify_onebag.py
